services:
  postgres:
    image: postgres:16-alpine
    container_name: llmstart-postgres
    # /dev/shm в контейнере по умолчанию ~64MB — Postgres часто падает (FATAL shared memory) и уходит в restart loop.
    shm_size: "512m"
    restart: unless-stopped
    # Явные лимиты для dev: меньше shared memory / соединений → стабильнее на Docker Desktop + WSL2.
    command:
      - postgres
      - -c
      - shared_buffers=96MB
      - -c
      - max_connections=50
      - -c
      - max_wal_size=256MB
    environment:
      POSTGRES_USER: llmstart
      POSTGRES_PASSWORD: llmstart
      POSTGRES_DB: llmstart
    ports:
      - "5432:5432"
    volumes:
      - llmstart_pg_data:/var/lib/postgresql/data
      - ./devops/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmstart -d llmstart"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    profiles: ["app"]
    build:
      context: .
      dockerfile: devops/backend/Dockerfile
    container_name: llmstart-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      # Перекрывает DATABASE_URL из backend/.env (часто 127.0.0.1); entrypoint дублирует экспорт.
      DOCKER_DATABASE_URL: postgresql+asyncpg://llmstart:llmstart@postgres:5432/llmstart
      DATABASE_URL: postgresql+asyncpg://llmstart:llmstart@postgres:5432/llmstart
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: "8000"
      # PROXY_URL из backend/.env часто указывает на 127.0.0.1 хоста; в контейнере это не хост → httpx ConnectError к OpenRouter.
      PROXY_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
    # Пока идёт Alembic в entrypoint, :8000 не слушается — без длинного start_period Docker помечает unhealthy.
    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: devops/web/Dockerfile
    container_name: llmstart-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      BACKEND_ORIGIN: http://backend:8000
      BACKEND_API_CLIENT_TOKEN: ${BACKEND_API_CLIENT_TOKEN:-}
    depends_on:
      backend:
        condition: service_healthy

  bot:
    profiles: ["app"]
    build:
      context: .
      dockerfile: devops/bot/Dockerfile
    container_name: llmstart-bot
    restart: unless-stopped
    env_file:
      - bot/.env
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: "8000"
      BACKEND_BASE_URL: ""
      # PROXY_URL не переопределяем: задайте в bot/.env при блокировке Telegram из контейнера —
      # http://host.docker.internal:<порт> к прокси/VPN на хосте (127.0.0.1 хоста из контейнера недоступен).
      BACKEND_HTTP_PROXY: ""
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy

volumes:
  llmstart_pg_data:
