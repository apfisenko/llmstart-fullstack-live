# Сборка и публикация образов backend / bot / web в GHCR.
# После успешного CI на main/master (или вручную). Теги: latest + sha-<short>.
name: GHCR images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  # По SHA коммита: не отменять публикацию предыдущего зелёного CI при быстром merge следующего.
  group: ghcr-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: backend
            file: devops/backend/Dockerfile
          - id: bot
            file: devops/bot/Dockerfile
          - id: web
            file: devops/web/Dockerfile
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Image root (lowercase for GHCR)
        id: img
        run: |
          root="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "root=${root}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_ROOT=${root}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # На main/master после зелёного CI (или вручную) — latest + sha (короткий).
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_ROOT }}/${{ matrix.id }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}

  # После публикации всех образов — деплой на VPS по SSH (см. docs/tech/docker-compose-ghcr.md § CD).
  deploy:
    name: Deploy to VPS
    needs: [build-push]
    if: needs.build-push.result == 'success' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    env:
      # Тот же ref, по которому собирался build-push.
      DEPLOY_GIT_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
      # Для `docker login ghcr.io` при приватных пакетах: имя владельца токена (если пусто — `repository_owner`).
      GHCR_LOGIN_USER: ${{ secrets.GHCR_DEPLOY_READ_USER != '' && secrets.GHCR_DEPLOY_READ_USER || github.repository_owner }}
    steps:
      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "$KNOWN" ]; then
            printf '%s' "$KNOWN" > ~/.ssh/known_hosts
          else
            if [ -z "$KEYSCAN_HOST" ]; then
              echo "Set DEPLOY_SSH_KNOWN_HOSTS, or set DEPLOY_HOST for ssh-keyscan fallback" >&2
              exit 1
            fi
            echo "::notice::DEPLOY_SSH_KNOWN_HOSTS empty: using ssh-keyscan (add the secret to pin the host key)" >&2
            port="${SSH_PORT:-22}"
            ssh-keyscan -p "$port" -H "$KEYSCAN_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts
        env:
          KNOWN: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
          KEYSCAN_HOST: ${{ secrets.DEPLOY_HOST }}

      - name: Roll out stack on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_DEPLOY_READ_TOKEN: ${{ secrets.GHCR_DEPLOY_READ_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.SSH_PORT != '' && env.SSH_PORT || 22 }}
          command_timeout: 20m
          script_stop: true
          envs: DEPLOY_GIT_REF,DEPLOY_PATH,GHCR_DEPLOY_READ_TOKEN,GHCR_LOGIN_USER
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"
            git fetch origin
            git checkout -f "$DEPLOY_GIT_REF"
            if [ -n "${GHCR_DEPLOY_READ_TOKEN:-}" ]; then
              echo "$GHCR_DEPLOY_READ_TOKEN" | docker login ghcr.io -u "$GHCR_LOGIN_USER" --password-stdin
            fi
            export IMAGE_TAG=latest
            docker compose -f docker-compose.ghcr.yml --profile app pull
            docker compose -f docker-compose.ghcr.yml --profile app up -d --wait
