name: GHCR images

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_suffix: backend
            dockerfile: devops/backend/Dockerfile
          - image_suffix: web
            dockerfile: devops/web/Dockerfile
          - image_suffix: bot
            dockerfile: devops/bot/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image name (lowercase)
        id: ghcr
        shell: bash
        run: |
          owner=${GITHUB_REPOSITORY_OWNER,,}
          repo=${GITHUB_REPOSITORY#*/}
          repo=${repo,,}
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${owner}/${repo}-${{ matrix.image_suffix }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ghcr.outputs.image }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ghcr-${{ matrix.image_suffix }}
          cache-to: type=gha,mode=max,scope=ghcr-${{ matrix.image_suffix }}
