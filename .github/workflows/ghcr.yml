# Сборка и публикация образов backend / bot / web в GHCR.
# Триггер: default branch (main/master) и ручной запуск. Теги: latest + sha-<short>.
name: GHCR images

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: backend
            file: devops/backend/Dockerfile
          - id: bot
            file: devops/bot/Dockerfile
          - id: web
            file: devops/web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Image root (lowercase for GHCR)
        id: img
        run: |
          root="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "root=${root}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_ROOT=${root}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Workflow срабатывает только на main/master — публикуем latest + sha (короткий) на каждый прогон.
      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_ROOT }}/${{ matrix.id }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.id }}
          cache-to: type=gha,mode=max,scope=${{ matrix.id }}
