name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: llmstart
          POSTGRES_PASSWORD: llmstart
          POSTGRES_DB: llmstart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmstart -d llmstart_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://llmstart:llmstart@127.0.0.1:5432/llmstart_test
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/web/pnpm-lock.yaml

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv sync --group dev
          cd backend && uv sync --extra dev

      - name: Frontend (lint + build)
        run: |
          cd frontend/web && pnpm install --frozen-lockfile
          cd frontend/web && pnpm lint
          cd frontend/web && pnpm build

      - name: Lint
        run: |
          uv run ruff check bot
          uv run ruff format --check bot
          cd backend && uv run --extra dev ruff check app tests && uv run --extra dev ruff format --check app tests

      - name: Test (PostgreSQL, tests/pg)
        run: cd backend && uv run pytest tests/pg
